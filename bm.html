<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">
<title>게임사 BM 정리 · VNG Korea Office</title>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --ink:#1f2430; --muted:#8a92a6; --line:#e6e8ee;
    --brand:#ec5e28; --brand-soft:#fff1ea;
    --accent:#3b5bdb; --accent-soft:#edf0ff;
    --ok:#2f9e44; --warn:#e8590c; --bad:#e03131;
    --shadow:0 1px 3px rgba(20,30,60,.06),0 6px 20px rgba(20,30,60,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Pretendard","Malgun Gothic","Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  .site-nav{background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(20,30,60,.04)}
  .site-nav-inner{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:28px;height:60px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand-mark{font-weight:900;font-size:26px;letter-spacing:-.06em;color:var(--brand);line-height:1}
  .brand-div{width:1px;height:22px;background:var(--line)}
  .brand-sub{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .nav-links{display:flex;gap:6px}
  .nav-links a{padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;color:var(--muted)}
  .nav-links a:hover{background:var(--bg);color:var(--ink)}
  .nav-links a.active{background:var(--brand-soft);color:var(--brand)}

  .shell{max-width:1280px;margin:0 auto;padding:20px;display:grid;grid-template-columns:248px 1fr;gap:20px;align-items:start}
  @media (max-width:860px){.shell{grid-template-columns:1fr}}

  /* sidebar */
  .side{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;position:sticky;top:20px}
  .side-head{padding:14px 14px 12px;border-bottom:1px solid var(--line)}
  .side-head h1{font-size:14px;margin:0 0 10px;letter-spacing:-.01em}
  .side-search{width:100%;border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13px;outline:none;background:#fff}
  .side-search:focus{border-color:var(--brand)}
  .co-list{max-height:calc(100vh - 150px);overflow-y:auto}
  .side .co{border-bottom:1px solid var(--line)}
  .side .co-name{display:flex;align-items:center;gap:7px;padding:11px 14px;font-size:12.5px;font-weight:800;color:var(--brand);letter-spacing:.02em;cursor:pointer;user-select:none}
  .side .co-name:hover{background:var(--brand-soft)}
  .side .co-name .co-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .side .co-name .caret{color:var(--muted);font-size:10px}
  .side .co-name .cnt{color:var(--muted);font-size:10.5px;font-weight:600}
  .side .co-name .logo{width:16px;height:16px;border-radius:4px;background:var(--brand);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none}
  .co-games{padding-bottom:6px}
  .co-games[hidden]{display:none}
  .letter{display:inline-block;margin:12px 0 3px 12px;padding:2px 9px;background:var(--brand-soft);color:var(--brand);border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.06em}
  .ptag{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.02em;padding:1px 5px;border-radius:4px;color:#fff;line-height:1.5;white-space:nowrap}
  .ptag.big{font-size:12px;padding:3px 10px;border-radius:6px}
  .ptag.pc{background:#1c7ed6}
  .ptag.mo{background:#2f9e44}
  .ptag.con{background:#7048e8}
  .ptag.bc{background:#e8590c}
  .ptag.etc{background:#868e96}
  .side a.g{display:block;padding:8px 14px 9px 22px;font-size:13px;color:var(--ink);cursor:pointer;border-left:3px solid transparent}
  .side a.g:hover{background:var(--bg)}
  .side a.g.active{background:var(--brand-soft);border-left-color:var(--brand);color:var(--brand);font-weight:700}
  .side a.g .g-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px}
  .side a.g .plat{display:flex;flex-wrap:wrap;gap:3px;min-width:0}
  .side a.g .yr{font-size:10.5px;color:var(--muted);flex:none}
  .side a.g.active .yr{color:var(--brand)}
  .side a.g .gname{display:block;line-height:1.35;word-break:keep-all;overflow-wrap:anywhere}
  .side a.overview{padding:9px 14px 9px 22px;font-weight:600}
  .side .soon{padding:8px 16px;font-size:12px;color:var(--muted)}

  /* main */
  .main{min-width:0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:22px 24px;margin-bottom:16px}
  .ghead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .ghead h2{font-size:24px;margin:0;letter-spacing:-.02em}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--bg);color:var(--muted)}
  .oneliner{color:var(--ink);font-size:15px;margin:4px 0 0;opacity:.85}
  .cover{position:relative;height:158px;border-radius:12px;margin-bottom:14px;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .cover .cover-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:58px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.28))}
  .cover img{position:relative;z-index:1;height:88%;width:auto;max-width:92%;object-fit:contain;filter:drop-shadow(0 3px 10px rgba(0,0,0,.25))}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px}
  .pill{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:#eef1f6;color:#4b5266}
  .pill.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:600}

  .outcome{background:linear-gradient(180deg,#fff8f4,#fff);border:1px solid #ffd9c7;border-radius:14px;padding:18px 22px;margin-bottom:16px}
  .outcome h3{margin:0 0 10px;font-size:15px;color:var(--brand);display:flex;align-items:center;gap:7px}
  .outcome ul{margin:0;padding-left:20px}
  .outcome li{margin:5px 0;font-size:14px}
  .fin{background:linear-gradient(180deg,#f2f8ff,#fff);border:1px solid #cfe1ff;border-radius:14px;padding:18px 22px;margin-bottom:16px}
  .fin h3{margin:0 0 10px;font-size:15px;color:var(--accent);display:flex;align-items:center;gap:7px}
  .fin ul{margin:0;padding-left:20px}
  .fin li{margin:5px 0;font-size:14px}
  .knums{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .knum{background:#fff;border:1px solid #ffd9c7;border-radius:9px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--warn)}

  .sec-title{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.04em;margin:0 0 12px}
  .sec-note{font-weight:600;color:var(--muted);font-size:11px}
  .bm-flow{display:flex;align-items:stretch;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px}
  .bm-stage{flex:1 1 0;min-width:158px;background:#fafbfd;border:1px solid var(--line);border-radius:12px;padding:11px 11px 13px}
  .bm-stage h4{margin:0 0 9px;font-size:12px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:5px;white-space:nowrap}
  .bm-arrow{display:flex;align-items:center;color:#c7ccd6;font-size:20px;font-weight:700;flex:none;padding:0 2px}
  .bm-node{display:block;font-size:12px;font-weight:600;color:var(--ink);background:#fff;border:1px solid var(--line);border-left:4px solid var(--c,#adb5bd);border-radius:8px;padding:6px 9px;margin:6px 0;line-height:1.35;word-break:keep-all}
  .bm-node .nc{display:block;font-size:9px;font-weight:800;letter-spacing:.02em;margin-bottom:2px}
  .bm-node.ph{border-left-color:#dfe3ea;color:var(--muted);font-weight:600;background:#f6f7f9}
  @media (max-width:720px){.bm-flow{flex-direction:column}.bm-arrow{transform:rotate(90deg);align-self:center}}
  .bm-legend{display:flex;flex-wrap:wrap;gap:6px 14px}
  .bm-legend-sp{margin-bottom:14px;padding-top:2px}
  .bm-cat{font-size:11.5px;color:#4b5266;display:inline-flex;align-items:center;gap:5px}
  .bm-cat i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .bm-cat b{color:var(--ink)}
  .bm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .bm-item{border:1px solid var(--line);border-left:4px solid var(--s-none);border-radius:11px;padding:12px 15px;background:#fcfcfd}
  .bm-item .bm-cat-tag{font-size:10px;font-weight:800;letter-spacing:.02em;margin-bottom:5px}
  .bm-item .n{font-size:14px;font-weight:700;margin-bottom:4px}
  .bm-item .d{font-size:13px;color:#4b5266;line-height:1.5}

  .sources{margin-top:6px}
  .sources h4{font-size:12px;color:var(--muted);margin:0 0 6px}
  .sources a{display:inline-block;font-size:12px;color:var(--accent);margin:0 10px 4px 0}
  .notes{font-size:13px;color:#4b5266}
  .notes li{margin:4px 0}

  .loading{padding:60px;text-align:center;color:var(--muted)}
  .disc{max-width:1280px;margin:0 auto;padding:0 20px 40px;font-size:11.5px;color:var(--muted);line-height:1.7}
</style>
</head>
<body>
<header class="site-nav">
  <div class="site-nav-inner">
    <a class="brand" href="index.html">
      <span class="brand-mark">VNG</span>
      <span class="brand-div"></span>
      <span class="brand-sub">Korea Office</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">📅 미팅 캘린더</a>
      <a href="pipeline.html">🤝 파트너 파이프라인</a>
      <a href="bm.html" class="active">🎮 게임사 BM</a>
    </nav>
  </div>
</header>

<div class="shell">
  <aside class="side" id="side">
    <div class="side-head">
      <h1>🎮 게임사 BM</h1>
      <input id="coSearch" class="side-search" placeholder="회사·게임 검색…" autocomplete="off">
    </div>
    <div class="co-list" id="coList"><div class="loading">불러오는 중…</div></div>
  </aside>
  <main class="main" id="main"><div class="card"><div class="loading">불러오는 중…</div></div></main>
</div>
<div class="disc" id="disc"></div>

<script>
let DB=null, CUR=null;        // CUR = "overview:ncsoft" | "game:ncsoft/lineagem"
let expanded=new Set();       // company ids whose game list is open
let sideFilter="";            // current search text
let IMAGES={};                // "companyId/gameId" -> image URL (data/bm/_images.json)

function esc(s){return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function currentCoId(){
  if(!CUR) return null;
  if(CUR.startsWith("overview:")) return CUR.slice(9);
  return CUR.replace("game:","").split("/")[0];
}

// platform → text tag list, parsed from the free-text platform field
function platList(p){
  p=String(p||""); const out=[];
  if(/pc|온라인|스팀|steam/i.test(p)) out.push({label:"PC",cls:"pc"});
  if(/모바일|mobile|android|ios/i.test(p)) out.push({label:"Mobile",cls:"mo"});
  if(/콘솔|console|ps5|ps4|xbox|switch|플레이스테이션|플스/i.test(p)) out.push({label:"Console",cls:"con"});
  if(/블록체인|blockchain/i.test(p)) out.push({label:"Blockchain",cls:"bc"});
  if(!out.length) out.push({label:"기타",cls:"etc"});
  return out;
}
function platTags(p,big){
  return platList(p).map(t=>`<span class="ptag ${t.cls}${big?' big':''}">${t.label}</span>`).join("");
}

// representative emoji per game — JSON "emoji" wins, else keyword-matched by franchise/genre
function gameEmoji(g){
  if(g && g.emoji) return g.emoji;
  const n=((g&&g.name||"")+" "+(g&&g.oneLiner||"")).toLowerCase();
  const rules=[
    [/리니지|lineage/,"⚔️"],[/니케|nikke/,"🔫"],[/쿠키런|cookie/,"🍪"],
    [/배틀그라운드|pubg|배그/,"🔫"],[/스텔라|stellar/,"🗡️"],[/검은사막|black desert|붉은사막|crimson/,"🐎"],
    [/메이플|maple/,"🍄"],[/던전앤파이터|던파|dnf|dungeon/,"👊"],[/피파|fc ?온라인|fc online|축구/,"⚽"],
    [/야구|baseball|프로야구|mlb/,"⚾"],[/골프|golf/,"⛳"],[/홈런/,"⚾"],
    [/뮤 |mu online|mu origin|무 온라인|r2/,"🗡️"],[/블루 ?아카이브|blue archive/,"🎓"],
    [/서머너즈|summoners/,"🔮"],[/마블|marvel/,"🦸"],[/세븐나이츠|seven knights/,"🛡️"],
    [/솔로|solo leveling|나 혼자만/,"🗡️"],[/eve|이브 온라인/,"🚀"],[/p의 거짓|lies of p/,"🎭"],
    [/고양이|cat/,"🐱"],[/djmax|리듬/,"🎵"],[/데이브|dave|다이버|diver/,"🤿"],
    [/오딘|odin/,"⚡"],[/우마무스메|우마|uma/,"🏇"],[/가디언|guardian/,"🛡️"],
    [/에버소울|eversoul|데스티니 ?차일드|destiny child|브라운더스트|browndust|에픽세븐|epic seven|아우터플레인|outerplane/,"✨"],
    [/크로스파이어|crossfire/,"🔫"],[/로스트아크|lost ark/,"🪓"],
    [/미르|mir|나이트 ?크로우|night crow|이미르|ymir/,"🐉"],[/위믹스|wemix|블록체인/,"⛓️"],
    [/아이온|aion/,"🕊️"],[/블레이드|blade/,"⚔️"],[/칼리스토|callisto/,"👾"],[/인조이|inzoi/,"🏠"],
    [/한게임|웹보드|포커|고스톱|맞고/,"🃏"],[/크루세이더|crusader/,"⚔️"],[/프렌즈팝|friends/,"🧩"],
    [/오버독스|overdox|헌터|hunter/,"🗡️"],[/플레이투게더|play together/,"🏝️"],
    [/아키에이지|archeage/,"🌊"],[/디센던트|descendant/,"👽"],[/신화|god|여신/,"🔮"]
  ];
  for(const [re,e] of rules){ if(re.test(n)) return e; }
  return "🎮";
}

// BM mechanic categories (for visual grouping)
const BM_CATS={
  gacha:{label:"확률형·가챠",color:"#e03131"},
  growth:{label:"성장·강화",color:"#f76707"},
  sub:{label:"구독·정기",color:"#1c7ed6"},
  pass:{label:"배틀패스",color:"#0ca678"},
  cosmetic:{label:"코스메틱",color:"#7048e8"},
  conv:{label:"편의(P2C)",color:"#2f9e44"},
  trade:{label:"거래·수수료",color:"#868e96"},
  premium:{label:"프리미엄 판매",color:"#4263eb"},
  chain:{label:"블록체인·P2E",color:"#a9611e"},
  ad:{label:"광고",color:"#f0a500"},
  etc:{label:"기타",color:"#adb5bd"}
};
// monetization flow stages (유입 → 몰입 → 과금 → 리텐션)
const BM_STAGES=[
  {key:"entry",  title:"유입·진입",     icon:"🚪"},
  {key:"engine", title:"몰입·경쟁 유발", icon:"⚙️"},
  {key:"convert",title:"과금 전환",      icon:"💳"},
  {key:"retain", title:"반복·리텐션",    icon:"🔁"}
];
const CAT_STAGE={ premium:"entry", growth:"engine", trade:"engine", gacha:"convert", cosmetic:"convert", chain:"convert", conv:"convert", sub:"retain", pass:"retain", ad:"retain", etc:"engine" };

function bmCategory(b){
  const t=((b&&b.name||"")+" "+(b&&b.desc||"")).toLowerCase();
  const h=re=>re.test(t);
  if(h(/블록체인|토큰|nft|p2e|위믹스|드레이코|채굴|코인/)) return "chain";
  if(h(/광고|리워드 광고/)) return "ad";
  if(h(/뽑기|가챠|확률형|확률 |소환|루트박스|상자|크레이트|캡슐|천장|픽업|콜라보/)) return "gacha";
  if(h(/배틀패스|배틀 패스|시즌 ?패스|로열 ?패스|시즌패스/)) return "pass";
  if(h(/구독|월정액|정액제|정액 |\bvip|멤버십|정기 ?상품|정기권/)) return "sub";
  if(h(/코스튬|스킨|외형|아바타|코스메틱|의상|염색|꾸미기|데코/)) return "cosmetic";
  if(h(/패키지|dlc|프리미엄|b2p|본편|에디션|곡 팩|확장팩|플레이 판매|투 플레이/)) return "premium";
  if(h(/편의|인벤토리|무게|펫|부스터|가속|페이컨비니언스|창고|자동/)) return "conv";
  if(h(/강화|인챈트|성장|각성|승급|재련|스타포스|룬|성물|클래스|직업|변신|마법인형|축복|은총|버프|장비|무기|방어구/)) return "growth";
  if(h(/거래소|수수료|로열티|중개/)) return "trade";
  return "etc";
}

// deterministic gradient per company (no external assets)
function coverStyle(id){
  let h=0; const s=String(id||"x"); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))%360;
  return `background:linear-gradient(135deg,hsl(${h},64%,56%),hsl(${(h+38)%360},70%,44%))`;
}

function renderSide(){
  const f=sideFilter.trim().toLowerCase();
  let html="", shown=0, lastLetter="";
  for(const co of DB.companies){
    const games=co.games||[];
    const nameMatch = !f || co.name.toLowerCase().includes(f);
    const gMatches = f ? games.filter(g=>String(g.name).toLowerCase().includes(f)) : games;
    if(f && !nameMatch && gMatches.length===0) continue;
    shown++;
    const letter=(String(co.name)[0]||"#").toUpperCase();
    if(letter!==lastLetter){ html+=`<div class="letter">${esc(letter)}</div>`; lastLetter=letter; }
    const gamesToShow = (f && !nameMatch) ? gMatches : games;      // matched by game → show only matches
    const isOpen = expanded.has(co.id) || (f && (nameMatch || gMatches.length>0));
    html+=`<div class="co">`;
    html+=`<div class="co-name ${isOpen?'open':''}" data-co="${co.id}">`
        + `<span class="co-label">${esc(co.name)}</span>`
        + `<span class="cnt">${games.length}</span>`
        + `<span class="caret">${isOpen?'▾':'▸'}</span></div>`;
    html+=`<div class="co-games" ${isOpen?'':'hidden'}>`;
    if(co.overview) html+=`<a class="g overview ${CUR==='overview:'+co.id?'active':''}" data-key="overview:${co.id}">📌 회사 개요</a>`;
    for(const g of gamesToShow){
      const key="game:"+co.id+"/"+g.id;
      html+=`<a class="g ${CUR===key?'active':''}" data-key="${key}">`
          + `<span class="g-top"><span class="plat">${platTags(g.platform)}</span><span class="yr">${esc(g.year||"")}</span></span>`
          + `<span class="gname">${esc(g.name)}</span></a>`;
    }
    html+=`</div></div>`;
  }
  if(!shown) html+=`<div class="soon">검색 결과가 없습니다.</div>`;
  const list=document.getElementById("coList");
  list.innerHTML=html;
  list.querySelectorAll(".co-name").forEach(el=>el.addEventListener("click",()=>{
    const id=el.dataset.co;
    if(expanded.has(id)) expanded.delete(id); else expanded.add(id);
    renderSide();
  }));
  list.querySelectorAll("a.g").forEach(a=>a.addEventListener("click",e=>{e.stopPropagation();location.hash=a.dataset.key;}));
}

function findGame(coId,gId){
  const co=DB.companies.find(c=>c.id===coId); if(!co) return null;
  const g=(co.games||[]).find(x=>x.id===gId); return g?{co,g}:null;
}

function renderMain(){
  const main=document.getElementById("main");
  if(CUR && CUR.startsWith("overview:")){
    const co=DB.companies.find(c=>c.id===CUR.slice(9));
    if(co && co.overview){
      main.innerHTML=`<div class="card">
        <div class="ghead"><h2>${esc(co.name)} · 회사 개요</h2></div>
        <p class="oneliner">${esc(co.overview.tagline||"")}</p></div>
        ${finHtml(co.overview.financials)}
        <div class="card"><p class="sec-title">BM 전략 흐름</p><ul class="notes">${(co.overview.summary||[]).map(s=>`<li>${esc(s)}</li>`).join("")}</ul></div>
        ${sourcesHtml(co.overview.sources)}`;
      return;
    }
  }
  const parts=(CUR||"").replace("game:","").split("/");
  const found=findGame(parts[0],parts[1]);
  if(!found){ main.innerHTML=`<div class="card"><div class="loading">왼쪽에서 게임을 선택하세요.</div></div>`; return; }
  const g=found.g;
  const pills=platTags(g.platform,true)
            + (g.year?`<span class="pill">📅 ${esc(g.year)}</span>`:"")
            + (g.platform?`<span class="pill ghost">${esc(g.platform)}</span>`:"");
  const img=g.image || IMAGES[found.co.id+"/"+g.id] || "";
  const cover=`<div class="cover" style="${coverStyle(found.co.id)}">`
            + (img?`<img src="${esc(img)}" alt="${esc(g.name)}" loading="lazy" onerror="this.remove()">`:"")
            + `<span class="cover-emoji">${gameEmoji(g)}</span></div>`;
  let html=`<div class="card">
      ${cover}
      <div class="ghead"><h2>${esc(g.name)}</h2></div>
      <div class="pills">${pills}</div>
      ${g.oneLiner?`<p class="oneliner">${esc(g.oneLiner)}</p>`:""}
    </div>`;

  if(g.outcome && g.outcome.length){
    html+=`<div class="outcome"><h3>📊 BM 도입 성과 · 아웃컴</h3>
      <ul>${g.outcome.map(o=>`<li>${esc(o)}</li>`).join("")}</ul>
      ${(g.keyNumbers&&g.keyNumbers.length)?`<div class="knums">${g.keyNumbers.map(k=>`<span class="knum">${esc(k)}</span>`).join("")}</div>`:""}
    </div>`;
  }
  if(g.bm && g.bm.length){
    const cats=g.bm.map(bmCategory);
    const counts={}; cats.forEach(c=>counts[c]=(counts[c]||0)+1);
    const order=Object.keys(BM_CATS).filter(k=>counts[k]);
    const legend=order.map(k=>`<span class="bm-cat"><i style="background:${BM_CATS[k].color}"></i>${BM_CATS[k].label} <b>${counts[k]}</b></span>`).join("");
    // group mechanics into flow stages
    const byStage={entry:[],engine:[],convert:[],retain:[]};
    g.bm.forEach((b,i)=>{ byStage[CAT_STAGE[cats[i]]||"engine"].push({b,cat:cats[i]}); });
    const flow=BM_STAGES.map((s,idx)=>{
      let nodes=byStage[s.key].map(o=>{const m=BM_CATS[o.cat];
        return `<span class="bm-node" style="--c:${m.color}"><span class="nc" style="color:${m.color}">${m.label}</span>${esc(o.b.name)}</span>`;}).join("");
      if(!nodes) nodes = s.key==="entry" ? `<span class="bm-node ph">기본 무료(F2P) 진입</span>` : `<span class="bm-node ph">–</span>`;
      const arrow = idx<BM_STAGES.length-1 ? `<div class="bm-arrow">→</div>` : "";
      return `<div class="bm-stage"><h4>${s.icon} ${s.title}</h4>${nodes}</div>${arrow}`;
    }).join("");
    const cards=g.bm.map((b,i)=>{const m=BM_CATS[cats[i]];
      return `<div class="bm-item" style="border-left-color:${m.color}">`
           + `<div class="bm-cat-tag" style="color:${m.color}">${m.label}</div>`
           + `<div class="n">${esc(b.name)}</div><div class="d">${esc(b.desc)}</div></div>`;}).join("");
    html+=`<div class="card"><p class="sec-title">🎯 BM 구조 <span class="sec-note">· 유입 → 몰입·경쟁 → 과금 전환 → 리텐션 흐름</span></p>
      <div class="bm-flow">${flow}</div>
      <div class="bm-legend bm-legend-sp">${legend}</div>
      <div class="bm-grid">${cards}</div></div>`;
  }
  if(g.notes && g.notes.length){
    html+=`<div class="card"><p class="sec-title">📝 참고</p><ul class="notes">${g.notes.map(n=>`<li>${esc(n)}</li>`).join("")}</ul></div>`;
  }
  html+=sourcesHtml(g.sources);
  main.innerHTML=html;
}

function finHtml(fin){
  if(!fin||!fin.length) return "";
  return `<div class="fin"><h3>💰 최근 실적</h3><ul>${fin.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`;
}

function sourcesHtml(src){
  if(!src||!src.length) return "";
  return `<div class="card sources"><h4>출처</h4>${src.map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">🔗 ${esc(s.title)}</a>`).join("")}</div>`;
}

function route(){
  const h=decodeURIComponent(location.hash.replace(/^#/,""));
  if(h) CUR=h;
  else {
    // default: first company overview, else first game
    const co=DB.companies[0];
    CUR = co.overview ? ("overview:"+co.id) : ("game:"+co.id+"/"+co.games[0].id);
  }
  const cid=currentCoId(); if(cid) expanded.add(cid);   // keep active company open
  renderSide(); renderMain();
}

async function boot(){
  try{
    // Company data is split one-file-per-company under data/bm/ ; _index.json lists the ids.
    const idx=await fetch("data/bm/_index.json",{cache:"no-store"}).then(r=>r.json());
    const cos=await Promise.all(idx.map(id=>
      fetch("data/bm/"+id+".json",{cache:"no-store"}).then(r=>r.ok?r.json():null).catch(()=>null)));
    DB={companies:cos.filter(Boolean).sort((a,b)=>String(a.name).localeCompare(String(b.name),"en"))};
    if(!DB.companies.length) throw new Error("no company data loaded");
    try{ IMAGES=await fetch("data/bm/_images.json",{cache:"no-store"}).then(r=>r.ok?r.json():{}); }catch(e){ IMAGES={}; }
    const search=document.getElementById("coSearch");
    search.addEventListener("input",e=>{ sideFilter=e.target.value; renderSide(); });
    window.addEventListener("hashchange",route);
    route();
    document.getElementById("disc").innerHTML =
      "※ 본 BM 정리는 공개 자료(기사·IR·게임 위키 등)를 바탕으로 한 내부 참고용 요약이며, 수치는 근사치일 수 있습니다. 각 항목의 '출처' 링크를 참고하세요.";
  }catch(err){
    document.getElementById("main").innerHTML=`<div class="card"><div class="loading">데이터를 불러오지 못했습니다.<br><small>${err}</small></div></div>`;
    document.getElementById("side").innerHTML="";
  }
}
boot();
</script>
</body>
</html>
