<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">
<script src="auth.js"></script>
<title>파트너 파이프라인 · VNG Korea Office</title>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --ink:#1f2430; --muted:#8a92a6; --line:#e6e8ee;
    --brand:#ec5e28; --brand-soft:#fff1ea; --accent:#3b5bdb; --accent-soft:#edf0ff;
    --shadow:0 1px 3px rgba(20,30,60,.06),0 6px 20px rgba(20,30,60,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Pretendard","Malgun Gothic","Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .site-nav{background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(20,30,60,.04)}
  .site-nav-inner{max-width:1600px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:28px;height:60px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand-mark{font-weight:900;font-size:26px;letter-spacing:-.06em;color:var(--brand);line-height:1}
  .brand-div{width:1px;height:22px;background:var(--line)}
  .brand-sub{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .nav-links{display:flex;gap:6px}
  .nav-links a{padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;color:var(--muted)}
  .nav-links a:hover{background:var(--bg);color:var(--ink)}
  .nav-links a.active{background:var(--brand-soft);color:var(--brand)}

  .wrap{max-width:1600px;margin:0 auto;padding:20px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
  header.top h1{font-size:20px;margin:0;letter-spacing:-.02em}
  header.top .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .search{border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:13px;width:190px;outline:none}
  .search:focus{border-color:var(--brand)}
  .pfilter{display:flex;gap:4px}
  .pf{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted)}
  .pf.on{background:var(--brand-soft);border-color:#ffcdb8;color:var(--brand);font-weight:700}

  .board{display:flex;gap:14px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
  .col{flex:0 0 250px;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);max-height:calc(100vh - 170px);display:flex;flex-direction:column}
  .col-head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--panel);border-radius:14px 14px 0 0}
  .col-head .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .col-head .cname{font-size:13px;font-weight:800;flex:1}
  .col-head .cn{font-size:12px;color:var(--muted);font-weight:700}
  .col-body{overflow-y:auto;padding:8px}
  .pcard{border:1px solid var(--line);border-left:3px solid var(--c,#adb5bd);border-radius:10px;padding:9px 11px;margin-bottom:8px;cursor:pointer;background:#fff}
  .pcard:hover{box-shadow:0 0 0 1px var(--line) inset;background:#fafbff}
  .pcard.nolink{cursor:default}
  .pcard .pn{font-size:13px;font-weight:700;line-height:1.35;word-break:keep-all}
  .pcard .meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
  .pcard .rg{font-size:10.5px;color:var(--muted)}
  .pcard .pri{font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:4px;color:#fff}
  .pri.h{background:#e03131} .pri.m{background:#f0a500} .pri.l{background:#adb5bd}
  .pcard .lm{font-size:10.5px;color:var(--muted);margin-top:4px}
  .pcard .lm b{color:#e8590c}
  .empty{padding:16px;color:var(--muted);font-size:12px;text-align:center}
  .loading{padding:60px;text-align:center;color:var(--muted)}
  .foot{margin-top:8px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<header class="site-nav">
  <div class="site-nav-inner">
    <a class="brand" href="index.html">
      <span class="brand-mark">VNG</span><span class="brand-div"></span><span class="brand-sub">Korea Office</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">📅 미팅 캘린더</a>
      <a href="pipeline.html" class="active">🤝 파트너 파이프라인</a>
      <a href="bm.html">🎮 게임사 BM</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <header class="top">
    <div>
      <h1>🤝 파트너 파이프라인</h1>
      <div class="sub" id="sub">회사 DB의 컨택 상태별 보드 · 카드 클릭 시 Notion 이동</div>
    </div>
    <div class="controls">
      <input class="search" id="search" placeholder="회사 검색…" autocomplete="off">
      <div class="pfilter" id="pfilter">
        <span class="pf on" data-p="">전체</span>
        <span class="pf" data-p="높음">높음</span>
        <span class="pf" data-p="중간">중간</span>
        <span class="pf" data-p="낮음">낮음</span>
      </div>
    </div>
  </header>
  <div class="board" id="board"><div class="loading">불러오는 중…</div></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const NOTION = id => "https://www.notion.so/" + String(id||"").replace(/-/g,"");
// funnel order (left→right)
const STAGES=[
  {key:"프로젝트 진행중", color:"#2f9e44"},
  {key:"3 논의 중",       color:"#1c7ed6"},
  {key:"2 접촉 중",       color:"#f76707"},
  {key:"1 계획 중",       color:"#7048e8"},
  {key:"네트워킹",        color:"#868e96"},
  {key:"보류",            color:"#e03131"},
  {key:"__none__",        color:"#ced4da", label:"미분류"}
];
const PRICLS={"높음":"h","중간":"m","낮음":"l"};
let COMPANIES=[], LASTMET={}, prioFilter="", searchText="";

function esc(s){return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

// build companyId -> most recent meeting date (YYYY-MM-DD) from meetings.json
function buildLastMet(meetings){
  const m={};
  for(const row of (meetings||[])){
    const t=String(row.note||"").match(/^(\d{2})(\d{2})(\d{2})\b/);
    if(!t) continue;
    const date=(2000+ +t[1])+"-"+t[2]+"-"+t[3];
    const ids=Array.isArray(row.company)?row.company:(row.company?[row.company]:[]);
    for(const id of ids){ if(!m[id]||date>m[id]) m[id]=date; }
  }
  return m;
}

function render(){
  const f=searchText.trim().toLowerCase();
  const byStage={}; STAGES.forEach(s=>byStage[s.key]=[]);
  let shown=0;
  for(const c of COMPANIES){
    if(!c.name) continue;   // skip empty/placeholder rows
    if(f && !String(c.name).toLowerCase().includes(f)) continue;
    if(prioFilter && c.priority!==prioFilter) continue;
    const key=c.status||"__none__";
    (byStage[key]=byStage[key]||[]).push(c); shown++;
  }
  // sort each column: has-meeting first (most recent), then name
  for(const k in byStage){
    byStage[k].sort((a,b)=>{
      const la=LASTMET[a.id]||"", lb=LASTMET[b.id]||"";
      if(la!==lb) return la<lb?1:-1;
      return String(a.name).localeCompare(String(b.name));
    });
  }
  let html="";
  for(const s of STAGES){
    const arr=byStage[s.key]||[];
    const label=s.label||s.key;
    html+=`<div class="col"><div class="col-head"><span class="dot" style="background:${s.color}"></span>`
        + `<span class="cname">${esc(label)}</span><span class="cn">${arr.length}</span></div><div class="col-body">`;
    if(!arr.length) html+=`<div class="empty">–</div>`;
    for(const c of arr){
      const lm=LASTMET[c.id];
      const pri=c.priority&&PRICLS[c.priority]?`<span class="pri ${PRICLS[c.priority]}">${esc(c.priority)}</span>`:"";
      const rg=c.region?`<span class="rg">📍${esc(c.region)}</span>`:"";
      const lmh=lm?`<div class="lm">최근 미팅 <b>${lm}</b></div>`:`<div class="lm">미팅 기록 없음</div>`;
      html+=`<div class="pcard ${c.id?'':'nolink'}" style="--c:${s.color}"${c.id?` data-href="${NOTION(c.id)}"`:""}>`
          + `<div class="pn">${esc(c.name)}</div>`
          + `<div class="meta">${pri}${rg}</div>${lmh}</div>`;
    }
    html+=`</div></div>`;
  }
  const board=document.getElementById("board");
  board.innerHTML=html;
  board.querySelectorAll(".pcard[data-href]").forEach(el=>el.addEventListener("click",()=>window.open(el.dataset.href,"_blank")));
  const totalNamed=COMPANIES.filter(c=>c.name).length;
  document.getElementById("foot").textContent=`총 ${totalNamed}개사 · 표시 ${shown}개`;
}

async function boot(){
  try{
    const [pRes,mRes]=await Promise.all([
      fetch("data/pipeline.json",{cache:"no-store"}),
      fetch("data/meetings.json",{cache:"no-store"})
    ]);
    COMPANIES=await pRes.json();
    if(!Array.isArray(COMPANIES)) COMPANIES=[];
    let meetings=[]; try{ meetings=await mRes.json(); }catch(e){}
    LASTMET=buildLastMet(meetings);
    render();
  }catch(err){
    document.getElementById("board").innerHTML=`<div class="loading">데이터를 불러오지 못했습니다.<br><small>${err}</small></div>`;
  }
}
document.getElementById("search").addEventListener("input",e=>{searchText=e.target.value;render();});
document.querySelectorAll("#pfilter .pf").forEach(el=>el.addEventListener("click",()=>{
  document.querySelectorAll("#pfilter .pf").forEach(x=>x.classList.remove("on"));
  el.classList.add("on"); prioFilter=el.dataset.p||""; render();
}));
boot();
</script>
</body>
</html>
